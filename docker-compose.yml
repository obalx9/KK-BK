version: '3.8'

services:
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - keykurs-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keykurs
      POSTGRES_USER: ${DB_USER:-keykurs}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - keykurs-network

volumes:
  postgres_data:

networks:
  keykurs-network:
    driver: bridge
